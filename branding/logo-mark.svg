<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="VoiceRefine mark">
  <title>VoiceRefine</title>
  <!-- Regular pointy-top hex inscribed in 64x64. Apothem 24.25, side 28. -->
  <polygon
    points="32,4 56.25,18 56.25,46 32,60 7.75,46 7.75,18"
    fill="none"
    stroke="#ffb300"
    stroke-width="2"
    stroke-linejoin="round"/>
  <!-- Non-monotonic waveform: medium, tall, short. Reads as audio amplitude, not signal strength. -->
  <rect x="20" y="25" width="3" height="14" rx="1.5" fill="#ffb300"/>
  <rect x="28" y="21" width="3" height="22" rx="1.5" fill="#ffb300"/>
  <rect x="36" y="27" width="3" height="10" rx="1.5" fill="#ffb300"/>
  <!-- Polished output: solid amber dot, the polished text dropping onto the clipboard. -->
  <circle cx="46" cy="32" r="3" fill="#ffb300"/>
</svg>
