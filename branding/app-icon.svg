<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-label="VoiceRefine app icon">
  <title>VoiceRefine</title>
  <!-- Solid ink tile. Renders flat under macOS / Windows icon masks. -->
  <rect width="1024" height="1024" rx="224" fill="#0b0b0c"/>
  <!-- Mark scaled from 64-grid (k=13.75) with 96px safe-area inset. -->
  <g transform="translate(96,96) scale(13.75)">
    <polygon
      points="32,4 56.25,18 56.25,46 32,60 7.75,46 7.75,18"
      fill="none"
      stroke="#ffb300"
      stroke-width="2.6"
      stroke-linejoin="round"/>
    <rect x="20" y="25" width="3" height="14" rx="1.5" fill="#ffb300"/>
    <rect x="28" y="21" width="3" height="22" rx="1.5" fill="#ffb300"/>
    <rect x="36" y="27" width="3" height="10" rx="1.5" fill="#ffb300"/>
    <circle cx="46" cy="32" r="3.4" fill="#ffb300"/>
  </g>
</svg>
