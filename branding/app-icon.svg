<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-label="VoiceRefine app icon">
  <title>VoiceRefine</title>
  <!-- Solid ink tile. Renders flat under macOS / Windows icon masks. -->
  <rect width="1024" height="1024" rx="224" fill="#0b0b0c"/>
  <!-- Mark scaled from 64-grid (k=13.75) with 96px safe-area inset. Strokes are deliberately bold so the Windows taskbar variant stays legible at 16-32px. -->
  <g transform="translate(96,96) scale(13.75)">
    <polygon
      points="32,4 56.25,18 56.25,46 32,60 7.75,46 7.75,18"
      fill="none"
      stroke="#ffb300"
      stroke-width="3.3"
      stroke-linejoin="round"/>
    <rect x="18.8" y="25" width="4.4" height="14" rx="2.2" fill="#ffb300"/>
    <rect x="26.8" y="21" width="4.4" height="22" rx="2.2" fill="#ffb300"/>
    <rect x="34.8" y="27" width="4.4" height="10" rx="2.2" fill="#ffb300"/>
    <circle cx="46.8" cy="32" r="4.2" fill="#ffb300"/>
  </g>
</svg>
